<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">ระบบคลังหนังสือ</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
          <button
            class="btn btn-outline-danger"
            onclick="logout()"
            type="button"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>
    <div class="mt-3">
      <div class="card">
        <div class="card-header">
          <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            เพิ่มหนังสือ
          </button>
        </div>

        <div
          class="modal fade"
          id="exampleModal"
          tabindex="-1"
          aria-labelledby="exampleModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog">
            <div class="modal-content">
              <form action="" onsubmit="add_books(event)">
                <div class="modal-header">
                  <h1 class="modal-title fs-5" id="exampleModalLabel">
                    Modal title
                  </h1>
                  <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"
                  ></button>
                </div>
                <div class="modal-body">
                  <div class="mb-3">
                    <label for="title" class="form-label">ชื่อหนังสือ</label>
                    <input
                      type="text"
                      class="form-control"
                      id="title"
                      placeholder="NodeJS"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="author" class="form-label">ผู้แต่ง</label>
                    <input
                      type="text"
                      class="form-control"
                      id="author"
                      placeholder="สมชาย"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="published_year" class="form-label"
                      >ปีที่พิมพ์</label
                    >
                    <input
                      type="number"
                      class="form-control"
                      id="published_year"
                      placeholder="2023"
                    />
                  </div>
                  <div class="mb-3">
                    <label for="price" class="form-label">ราคา</label>
                    <input
                      type="number"
                      class="form-control"
                      id="price"
                      placeholder="300"
                    />
                  </div>
                </div>
                <div class="modal-footer">
                  <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                  >
                    ปิด
                  </button>
                  <button type="submit" class="btn btn-primary">
                    เพิ่มหนังสือ
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="card-body">
          <table class="table">
            <thead>
              <tr>
                <th scope="col"># ID</th>
                <th scope="col">ชื่อหนังสือ</th>
                <th scope="col">ผู้แต่ง</th>
                <th scope="col">ปีที่พิมพ์</th>
                <th scope="col">ราคา</th>
                <th scope="col">จัดการ</th>
              </tr>
            </thead>
            <tbody id="bookTableBody">
              <tr>
                <td colspan="5" class="text-center">กำลังโหลดข้อมูล...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const loadBooks = async () => {
        try {
          const token = localStorage.getItem('token');
          const res = await fetch('http://localhost:3000/api/book', {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });

          const data = await res.json();
          const tbody = document.querySelector('#bookTableBody');

          if (!res.ok) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">${data.message || 'ไม่สามารถโหลดข้อมูลได้'}</td></tr>`;
            return;
          }

          if (!data.data || data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">ไม่มีข้อมูลหนังสือ</td></tr>';
            return;
          }

          tbody.innerHTML = data.data.map((book) => `
            <tr>
              <th scope="row">${book.id}</th>
              <td>${book.title}</td>
              <td>${book.author}</td>
              <td>${book.published_year}</td>
              <td>${Number(book.price).toLocaleString('th-TH', { minimumFractionDigits: 2 })}</td>
              <td>
                <button class="btn btn-sm btn-warning me-2" onclick="editBook(${book.id}, '${book.title.replace(/'/g, "\\'")}', '${book.author.replace(/'/g, "\\'")}', ${book.published_year}, ${book.price})">แก้ไข</button>
                <button class="btn btn-sm btn-danger" onclick="deleteBook(${book.id})">ลบ</button>
              </td>
            </tr>
          `).join('');
        } catch (error) {
          console.log(error);
          document.querySelector('#bookTableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>';
        }
      };

      add_books = async (event) => {
        event.preventDefault();
        const title = document.querySelector('#title').value;
        const author = document.querySelector('#author').value;
        const published_year = document.querySelector('#published_year').value;
        const price = document.querySelector('#price').value;

        try {
          const token = localStorage.getItem('token');
          const res = await fetch('http://localhost:3000/api/book', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ title, author, published_year, price })
          });

          const data = await res.json();
          if (res.ok) {
            alert('เพิ่มหนังสือสำเร็จ');
            document.querySelector('#exampleModal button.btn-close').click();
            document.querySelector('form').reset();
            loadBooks();
          } else {
            alert(data.message || 'เพิ่มหนังสือไม่สำเร็จ');
          }
        } catch (error) {
          console.log(error);
          alert('เกิดข้อผิดพลาด');
        }
      };

      deleteBook = async (id) => {
        if (!confirm('คุณต้องการลบหนังสือนี้ใช่ไหม?')) return;

        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`http://localhost:3000/api/book/${id}`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });

          const data = await res.json();
          if (res.ok) {
            alert('ลบหนังสือสำเร็จ');
            loadBooks();
          } else {
            alert(data.message || 'ลบหนังสือไม่สำเร็จ');
          }
        } catch (error) {
          console.log(error);
          alert('เกิดข้อผิดพลาด');
        }
      };

      editBook = (id, title, author, published_year, price) => {
        const newTitle = prompt('ชื่อหนังสือใหม่', title);
        if (newTitle === null) return;

        const newAuthor = prompt('ผู้แต่งใหม่', author);
        if (newAuthor === null) return;

        const newPublishedYear = prompt('ปีที่พิมพ์ใหม่', published_year);
        if (newPublishedYear === null) return;

        const newPrice = prompt('ราคาสินค้าใหม่', price);
        if (newPrice === null) return;

        updateBook(id, newTitle, newAuthor, newPublishedYear, newPrice);
      };

      updateBook = async (id, title, author, published_year, price) => {
        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`http://localhost:3000/api/book/${id}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ title, author, published_year, price })
          });

          const data = await res.json();
          if (res.ok) {
            alert('แก้ไขหนังสือสำเร็จ');
            loadBooks();
          } else {
            alert(data.message || 'แก้ไขหนังสือไม่สำเร็จ');
          }
        } catch (error) {
          console.log(error);
          alert('เกิดข้อผิดพลาด');
        }
      };

      main = () => {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = './';
          return;
        }
        loadBooks();
      };

      logout = () => {
        if (confirm('คุณต้องการออกจากระบบใช่ไหม')) {
          localStorage.removeItem('token');
          localStorage.removeItem('username');
          window.location.href = './';
        }
      };

      main();
    </script>
  </body>
</html>
